<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240">
  <!-- Horizontal traces -->
  <line x1="0" y1="80" x2="80" y2="80" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.10"/>
  <line x1="160" y1="80" x2="240" y2="80" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.10"/>
  <line x1="80" y1="160" x2="240" y2="160" stroke="#15803d" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.08"/>

  <!-- Vertical traces -->
  <line x1="80" y1="0" x2="80" y2="80" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.10"/>
  <line x1="80" y1="80" x2="80" y2="240" stroke="#15803d" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.08"/>
  <line x1="160" y1="0" x2="160" y2="80" stroke="#15803d" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.08"/>
  <line x1="160" y1="160" x2="160" y2="240" stroke="#15803d" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.08"/>

  <!-- Pads at trace junctions -->
  <circle cx="80" cy="80" r="5.5" fill="#15803d" opacity="0.12"/>
  <circle cx="160" cy="80" r="5" fill="#15803d" opacity="0.10"/>
  <circle cx="80" cy="160" r="5" fill="#15803d" opacity="0.10"/>
  <circle cx="160" cy="160" r="5.5" fill="#15803d" opacity="0.12"/>
  <circle cx="0" cy="80" r="4" fill="#15803d" opacity="0.08"/>
  <circle cx="80" cy="0" r="4" fill="#15803d" opacity="0.08"/>
  <circle cx="240" cy="80" r="4" fill="#15803d" opacity="0.08"/>
  <circle cx="160" cy="240" r="4" fill="#15803d" opacity="0.08"/>

  <!-- Vias (annular ring + drill hole) -->
  <circle cx="200" cy="40" r="7.5" stroke="#15803d" stroke-width="3" fill="none" opacity="0.10"/>
  <circle cx="200" cy="40" r="3" fill="#15803d" opacity="0.10"/>

  <circle cx="40" cy="200" r="7.5" stroke="#15803d" stroke-width="3" fill="none" opacity="0.10"/>
  <circle cx="40" cy="200" r="3" fill="#15803d" opacity="0.10"/>

  <!-- IC footprint (SOIC-8 style, centered lower-right) -->
  <rect x="96" y="96" width="48" height="68" rx="3" stroke="#15803d" stroke-width="1.5" fill="none" opacity="0.09"/>
  <!-- IC pin pads left -->
  <rect x="87" y="104" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="87" y="116" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="87" y="128" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="87" y="140" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <!-- IC pin pads right -->
  <rect x="144" y="104" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="144" y="116" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="144" y="128" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="144" y="140" width="9" height="6" rx="1" fill="#15803d" opacity="0.08"/>

  <!-- Passive component (0805 resistor/cap) upper-left area -->
  <rect x="16" y="108" width="28" height="14" rx="2" stroke="#15803d" stroke-width="1" fill="none" opacity="0.08"/>
  <rect x="8" y="110" width="8" height="10" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="44" y="110" width="8" height="10" rx="1" fill="#15803d" opacity="0.08"/>

  <!-- Passive component lower-right area -->
  <rect x="196" y="168" width="28" height="14" rx="2" stroke="#15803d" stroke-width="1" fill="none" opacity="0.08"/>
  <rect x="188" y="170" width="8" height="10" rx="1" fill="#15803d" opacity="0.08"/>
  <rect x="224" y="170" width="8" height="10" rx="1" fill="#15803d" opacity="0.08"/>
</svg>
